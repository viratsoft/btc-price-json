name: Update BTC Prices

on:
  schedule:
    # Daily at 07:00 AM IST (01:30 UTC)
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update Bitcoin JSON Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Show Environment
        run: |
          echo "PHP Version:"
          php -v
          echo ""
          echo "Current UTC Time:"
          date -u

      - name: Run Updater
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          php -d display_errors=1 update.php

      - name: Show Git Status
        run: |
          echo ""
          echo "Git Status:"
          git status --short

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add json/*.json

          if git diff --cached --quiet; then
            echo ""
            echo "========================================"
            echo "No JSON changes detected"
            echo "========================================"
          else
            echo ""
            echo "========================================"
            echo "Changes detected"
            echo "========================================"

            git commit -m "Daily BTC price update"
            git push

            echo ""
            echo "========================================"
            echo "Changes committed and pushed"
            echo "========================================"
          fi
