name: Update BTC Prices

on:
  schedule:
    # Every 3 hours (00:03, 03:03, 06:03, 09:03, 12:03, 15:03, 18:03, 21:03 UTC)
    # IST: 05:33 AM, 08:33 AM, 11:33 AM, 02:33 PM, 05:33 PM, 08:33 PM, 11:33 PM, 02:33 AM
    - cron: '3 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update Bitcoin JSON Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Show Environment
        run: |
          echo "PHP Version:"
          php -v
          echo ""
          echo "Current UTC Time:"
          date -u

      - name: Run Updater
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          php -d display_errors=1 update.php

      - name: Show Git Status
        run: |
          echo ""
          echo "Git Status:"
          git status --short

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add json/*.json

          if git diff --cached --quiet; then
            echo ""
            echo "========================================"
            echo "No JSON changes detected"
            echo "========================================"
          else
            echo ""
            echo "========================================"
            echo "Changes detected"
            echo "========================================"

            git commit -m "Daily BTC price update"
            git push

            echo ""
            echo "========================================"
            echo "Changes committed and pushed"
            echo "========================================"
          fi
